<html>
    <head>
        <title>ConflictCampaign - Dashboard</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Conflict Dashboard</h1>
        <p>Select your next geopolitical move!</p>
        <div>
            <button type="button" onclick="alert('You sent a strongly worded letter! It\'s not very effective...')">Send a strongly worded letter.</button>
        </div>
        <div>
            <button type="button" onclick="alert('You left another global organization! It\'s not very effective...')">Leave another global organization.</button>
        </div>
        <div>
            <button type="button" onclick="alert('You imposed trade sanctions! It\'s not very effective...')">Trade sanctions!</button>
        </div>
        <div>
            <button type="button" onclick="alert('You bribed your government of choice! It\'s not very effective...')">Bribe your government of choice!</button>
        </div>
        <div>
            <button type="button" onclick="alert('You held a \u0022peace\u0022 summit! It might just have been the LEAST effective thing you could POSSIBLY have done.')">Hold a "peace" summit?</button>
        </div>
        <div>
            <button type="button">Launch <b>AI-powered</b> nukes...</button>
        </div>
        <span id="footer"></span>
    </body>
    <script>
        const footer = document.getElementById("footer");
        const repoUrl = "https://github.com/TechDudie/ConflictCampaign";

        async function setBuildFooter() {
            try {
                const response = await fetch("https://api.github.com/repos/TechDudie/ConflictCampaign/commits?per_page=1");
                if (!response.ok) {
                    throw new Error("Failed to fetch latest commit");
                }

                const commits = await response.json();
                const sha = (commits[0]?.sha || "unknown").slice(0, 7);
                footer.innerHTML = `<a href="${repoUrl}" target="_blank" rel="noopener noreferrer">Build ${sha} from 6 or 7 hours ago.</a>`;
            } catch (error) {
                footer.innerHTML = `<a href="${repoUrl}" target="_blank" rel="noopener noreferrer">Build unknown from 6 or 7 hours ago.</a>`;
            }
        }

        setBuildFooter();
    </script>
</html>
